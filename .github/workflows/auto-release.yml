name: Auto-Create Release
on:
  workflow_call:

jobs:
  update:
    runs-on: ubuntu-latest
    name: Create a release
    steps:
      - uses: actions/checkout@v6

      - name: Extract new version from changelog
        id: new_version
        run: |
          # -oP prints only the matched text; tr strips trailing whitespace/newline from the match
          VERSION=$(grep -oP 'v[0-9]+.*' CHANGELOG.md | head -1 | tr -d '[:space:]')
          echo "Extracted version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get current version from Github (NOT including pre-releases)
        id: current_stable_version
        run: |
          # /releases/latest returns 404 with no tag_name on first-ever release; // empty converts jq null to ""
          CURRENT_STABLE_VERSION=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/latest" | jq -r '.tag_name // empty')

          if [[ -z "$CURRENT_STABLE_VERSION" ]]; then
            echo "No previous stable release found."
            echo "version=__none__" >> $GITHUB_OUTPUT
          else
            echo "Latest stable release tag: $CURRENT_STABLE_VERSION"
            echo "version=$CURRENT_STABLE_VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Get current version from GitHub (including pre-releases)
        id: recent_version
        run: |
          RESPONSE=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases)

          # else empty handles non-array responses (e.g. rate limit errors) without crashing
          RECENT_VERSION=$(echo "$RESPONSE" | jq -r '
            if type == "array" then
              map(select(.draft == false)) |
              sort_by(.published_at) |
              reverse |
              .[0] // {} |
              .tag_name // empty
            else
              empty
            end
          ')

          if [[ -z "$RECENT_VERSION" ]]; then
            echo "No previous release found."
            echo "version=__none__" >> $GITHUB_OUTPUT
          else
            echo "Latest release tag (including pre-releases): $RECENT_VERSION"
            echo "version=$RECENT_VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Check version comparison
        id: check_version
        run: |
          if [[ "${{ steps.new_version.outputs.version }}" == "${{ steps.recent_version.outputs.version }}" ]]; then
            echo "Version is unchanged. Skipping release creation."
            echo "should_create_release=skip" >> $GITHUB_OUTPUT
          else
            echo "New version detected. Proceeding with release creation."
            echo "should_create_release=create" >> $GITHUB_OUTPUT
          fi

      - name: Extract release notes from changelog
        id: extract_notes
        run: |
          # \$ passes a literal $ (end-of-line anchor) to awk, so v1.0.0 doesn't match v1.0.0-b1
          START_LINE=$(awk "/^# .*${{ steps.new_version.outputs.version }}\$/{print NR+1; exit}" CHANGELOG.md)

          if [[ -z "$START_LINE" ]]; then
            echo "Error: version header '${{ steps.new_version.outputs.version }}' not found in CHANGELOG.md"
            exit 1
          fi

          if [[ "${{ steps.recent_version.outputs.version }}" == "__none__" ]]; then
            END_LINE=$(wc -l < CHANGELOG.md)
          else
            END_LINE=$(awk "/^# .*${{ steps.recent_version.outputs.version }}\$/{print NR-1; exit}" CHANGELOG.md)

            # Fallback: previous release may be a pre-release removed from the changelog (e.g. -b1/-a1 entries).
            # Find the next H1 after the new version header instead.
            if [[ -z "$END_LINE" || "$END_LINE" -le "$START_LINE" ]]; then
              echo "Previous version header '${{ steps.recent_version.outputs.version }}' not found in changelog — falling back to next H1 boundary"
              END_LINE=$(awk -v start="$START_LINE" 'NR > start && /^# /{print NR-1; exit}' CHANGELOG.md)
              if [[ -z "$END_LINE" ]]; then
                END_LINE=$(wc -l < CHANGELOG.md)
              fi
            fi
          fi

          echo "Extracting changelog lines $START_LINE to $END_LINE"
          awk -v start_line="$START_LINE" -v end_line="$END_LINE" 'NR >= start_line && NR <= end_line' CHANGELOG.md > extracted_notes.txt

      - name: Format release notes for description
        id: format_notes
        run: |
          # Heredoc syntax required for multiline $GITHUB_OUTPUT values
          # Remove hyperlinks from contributor mentions: [@username](url) → @username
          {
            echo "formatted_notes<<RELEASE_NOTES_EOF"
            sed 's/\[@\([[:alnum:]_-]*\)\](\([^)]*\))/@\1/g' extracted_notes.txt
            echo "RELEASE_NOTES_EOF"
          } >> $GITHUB_OUTPUT

      - name: Get Repository Name
        id: repo_name
        run: |
          REPO_NAME=$(basename "${{ github.repository }}")
          echo "Repository Name: $REPO_NAME"
          echo "repo_name=$REPO_NAME" >> $GITHUB_OUTPUT

      - name: Determine pre-release and target branch
        id: release_params
        run: |
          VERSION="${{ steps.new_version.outputs.version }}"

          # Pre-releases use a dash suffix format: v1.2.3-b1 or v1.2.3-a1
          if [[ "$VERSION" =~ [ab][0-9]+$ ]]; then
            echo "Detected pre-release tag: $VERSION"
            IS_PRERELEASE=true
            RELEASE_BRANCH="${{ github.head_ref }}"
          else
            echo "Detected full release tag: $VERSION"
            IS_PRERELEASE=false
            RELEASE_BRANCH="main"
          fi

          echo "Pre-release: $IS_PRERELEASE"
          echo "Target branch: $RELEASE_BRANCH"

          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          echo "release_branch=$RELEASE_BRANCH" >> $GITHUB_OUTPUT

      - name: Create the release
        if: steps.check_version.outputs.should_create_release == 'create'
        id: create_release
        env:
          version: ${{ steps.new_version.outputs.version }}
          title: ${{ steps.new_version.outputs.version }} ${{ steps.repo_name.outputs.repo_name }}
          description: ${{ steps.format_notes.outputs.formatted_notes }}
          branch: ${{ steps.release_params.outputs.release_branch }}
          prerelease: ${{ steps.release_params.outputs.is_prerelease }}
          repo: ${{ github.repository }}
          token: ${{ secrets.GH_TOKEN }}
          current_stable: ${{ steps.current_stable_version.outputs.version }}
          current_any: ${{ steps.recent_version.outputs.version }}
        run: |
          # Pre-releases compare against the most recent release of any kind;
          # stable releases only compare against the last stable release
          if [[ "$prerelease" == "true" ]]; then
            base_version="$current_any"
          else
            base_version="$current_stable"
          fi

          if [[ "$base_version" != "__none__" ]]; then
            compare_url="https://github.com/${repo}/compare/${base_version}...${version}"
            echo "Using base version: $base_version"
            echo "Compare URL: $compare_url"
            # $'\n\n' is bash ANSI-C quoting to embed literal newlines in the string
            body="${description}"$'\n\n'"**Full Changelog**: ${compare_url}"
          else
            echo "No base version found — skipping changelog link."
            body="$description"
          fi

          # --argjson (not --arg) so "true"/"false" strings become JSON booleans in the payload
          PAYLOAD=$(jq -n \
            --arg tag_name "$version" \
            --arg target_commitish "$branch" \
            --arg name "$title" \
            --arg body "$body" \
            --argjson draft true \
            --argjson prerelease "$prerelease" \
            '{tag_name: $tag_name, target_commitish: $target_commitish, name: $name, body: $body, draft: $draft, prerelease: $prerelease}')

          # -w "%{http_code}" appends the 3-digit HTTP status code to the response body
          RESPONSE=$(curl -X POST \
            -w "%{http_code}" \
            -H "Authorization: token $token" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$repo/releases" \
            -d "$PAYLOAD")

          # Extract the status code appended to the end of the response by -w
          STATUS_CODE=$(echo "${RESPONSE: -3}")

          echo "Response: $RESPONSE"

          if [[ "$STATUS_CODE" -lt 200 || "$STATUS_CODE" -ge 300 ]]; then
            echo "Error: GitHub API request failed with status code $STATUS_CODE"
            exit 1
          fi